<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Космические баталии</title>

    <link href="/css/bootstrap.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">🚀 Космические баталии</a>
    </div>
</nav>
<div class="row mx-5">
    <div class="col-md-6 mt-3">
        <div class="card">
            <div class="card-header">Присоединиться к игре</div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="game-code" class="form-label">Код игры</label>
                    <input type="text" class="form-control" id="game-code" aria-describedby="game-code">

                    <div class="invalid-feedback">
                        Нет игры с таким кодом
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="game-join">Присоединиться</button>
            </div>
        </div>
    </div>

    <div class="col-md-6 mt-3">
        <div class="card" id="game-create-card">
            <div class="card-header">Создать свою игру</div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="game-code" class="form-label">Количество игроков</label>

                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" value="2" name="players-count" id="players-count-2"
                               autocomplete="off" checked>
                        <label class="btn btn-outline-primary" for="players-count-2">2</label>

                        <input type="radio" class="btn-check" value="3" name="players-count" id="players-count-3"
                               autocomplete="off">
                        <label class="btn btn-outline-primary" for="players-count-3">3</label>

                        <input type="radio" class="btn-check" value="4" name="players-count" id="players-count-4"
                               autocomplete="off">
                        <label class="btn btn-outline-primary" for="players-count-4">4</label>

                        <input type="radio" class="btn-check" value="5" name="players-count" id="players-count-5"
                               autocomplete="off">
                        <label class="btn btn-outline-primary" for="players-count-5">5</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="game-create">Создать</button>
            </div>
        </div>

        <div class="card d-none" id="game-created-card">
            <div class="card-header">Ваша игра</div>
            <div class="card-body">
                <p class="fw-bold">Коды игроков:</p>

                <div class="list-group" id="game-created-links-container">
<!--                    <div class="list-group-item d-flex align-items-center p-0">-->
<!--                        <div class="ps-3 py-2">-->
<!--                            12341234-->
<!--                        </div>-->

<!--                        <div class="px-3 py-2 ms-auto btn rounded-0 btn-primary">-->
<!--                            <i class="fas fa-copy"></i>-->
<!--                        </div>-->

<!--                        <div class="px-3 py-2 btn rounded-0 rounded-end btn-primary">-->
<!--                            <i class="fas fa-arrow-right"></i>-->
<!--                        </div>-->
<!--                    </div>-->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function getGameURL(code) {
        return '/game/' + code.toString();
    }

    function getCheckGameURL(code) {
        return '/check/' + code.toString();
    }

    function getCreateGameURL(playersCount) {
        return '/create?count=' + playersCount;
    }

    let joinGameButton = document.getElementById('game-join');
    let gameCodeInput = document.getElementById('game-code');

    joinGameButton.addEventListener('click', event => {
        event.preventDefault();

        let code = gameCodeInput.value;

        if (!code.match(/[0-9]{6}/)) {
            gameCodeInput.classList.add('is-invalid');

            return;
        }

        gameCodeInput.classList.remove('is-invalid');

        fetch(getCheckGameURL(code))
            .then(response => {
                return response.text();
            })
            .then(text => {
                if (text === 'true') {
                    location.href = getGameURL(code);
                } else {
                    gameCodeInput.classList.add('is-invalid');
                }
            });
    });

    let createGameButton = document.getElementById('game-create');

    createGameButton.addEventListener('click', event => {
        event.preventDefault();

        let radios = document.getElementsByName('players-count');

        for (let radio of radios) {
            if (radio.checked) {
                let playersCount = parseInt(radio.value);

                fetch(getCreateGameURL(playersCount))
                    .then(response => {
                        return response.text();
                    })
                    .then(text => {
                        let links = JSON.parse(text);
                        let linksContainer = document.getElementById('game-created-links-container');

                        for (let link of links) {
                            let linkElement = document.createElement("span");
                            linkElement.textContent = link;
                            linkElement.classList.add('list-group-item');

                            linksContainer.appendChild(linkElement);
                        }

                        document.getElementById('game-create-card').classList.add('d-none');
                        document.getElementById('game-created-card').classList.remove('d-none');
                    });

                break;
            }
        }
    });
</script>
</body>
</html>
