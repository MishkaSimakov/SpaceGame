# -----------------------------
# From Reducer.ts
# -----------------------------
- name: initGameState
  payload:
    - name: state
      type:
        ref: GameState

- name: playerRebuiltSpaceship
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: newSpaceship
      type:
        ref: Spaceship
    - name: newHand
      type:
        elements:
          ref: Card

- name: beginFight
  payload:
    - name: attacker
      type:
        ref: PlayerId
    - name: victim
      type:
        ref: PlayerId
  meta:
    - name: reason
      type:
        type: string

- name: popCardFromStack
  payload:
    - name: type
      type:
        ref: CardType

- name: setCurrentPlayer
  payload:
    - name: player
      type:
        ref: PlayerId

- name: changePlayerEnergy
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: delta
      type:
        type: int32
  meta:
    - name: reason
      type:
        type: string

- name: clearDiscard
  payload:
    - name: type
      type:
        ref: CardType

- name: playerSkipNextTurn
  payload:
    - name: player
      type:
        ref: PlayerId

- name: destructSpaceshipModules
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: positions
      type:
        elements:
          ref: Vector2
    - name: destructedCardsDestiny
      type:
        ref: CardDestination
    - name: detachedCardsDestiny
      type:
        ref: CardDestination

- name: pushCardsToStack
  payload:
    - name: cards
      type:
        elements:
          ref: Card

- name: pushCardsToHand
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: cards
      type:
        elements:
          ref: Card

- name: changeModuleHealth
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: position
      type:
        ref: Vector2
    - name: delta
      type:
        type: int32
  meta:
    - name: reason
      type:
        type: string

- name: popCardsFromHand
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: indexes
      type:
        elements:
          type: int32
  meta:
    - name: reason
      type:
        type: string

- name: deactivateProtectorIfActive
  payload:
    - name: player
      type:
        ref: PlayerId

- name: removeSpaceshipModules
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: positions
      type:
        elements:
          ref: Vector2

- name: pushCardsToDiscard
  payload:
    - name: cards
      type:
        elements:
          ref: Card

- name: playerLost
  payload:
    - name: player
      type:
        ref: PlayerId

- name: endFight
  payload: [ ]

- name: activateProtector
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: position
      type:
        ref: Vector2

- name: shiftFightTurnToNextPlayer
  payload: [ ]

- name: playerUseModuleSecondTime
  payload:
    - name: player
      type:
        ref: PlayerId

- name: addTimeRecord
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: type
      type:
        ref: TimeRecordType
    - name: time
      type:
        type: int32

- name: changePlayerTime
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: delta
      type:
        type: int32

- name: insertPause
  payload:
    - name: from
      type:
        type: int32
    - name: to
      type:
        type: int32

# -----------------------------
# From Main.ts (requests + misc)
# -----------------------------
- name: choosePlayerForAttackRequest
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: reason
      type:
        ref: AttackReason
    - name: required
      type:
        type: boolean

- name: choosePlayerForAttackResponse
  payload:
    - name: victim
      type:
        ref: PlayerId
        nullable: true

- name: rebuildSpaceshipRequest
  payload:
    - name: player
      type:
        ref: PlayerId

- name: rebuildSpaceshipResponse
  payload:
    - name: newSpaceship
      type:
        elements:
          properties:
            id:
              ref: ModuleId
            position:
              ref: Vector2
            rotation:
              type: int32

- name: chooseCardTypeRequest
  payload:
    - name: player
      type:
        ref: PlayerId

- name: chooseCardTypeResponse
  payload:
    - name: chosenType
      type:
        ref: CardType

- name: showCardsToPlayersRequest
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: cardsReceiver
      type:
        ref: PlayerId
    - name: cards
      type:
        elements:
          ref: Card

- name: showCardsToPlayersResponse
  payload: [ ]

- name: drawAdditionalModuleCardRequest
  payload:
    - name: player
      type:
        ref: PlayerId

- name: drawAdditionalModuleCardResponse
  payload:
    - name: draw
      type:
        type: boolean

- name: drawAnotherEventCardRequest
  payload:
    - name: player
      type:
        ref: PlayerId

- name: drawAnotherEventCardResponse
  payload:
    - name: draw
      type:
        type: boolean

- name: discardCardsRequest
  payload:
    - name: player
      type:
        ref: PlayerId

- name: discardCardsResponse
  payload:
    - name: indexes
      type:
        elements:
          type: int32

- name: chooseProtectorRequest
  payload:
    - name: player
      type:
        ref: PlayerId

- name: chooseProtectorResponse
  payload:
    - name: position
      type:
        ref: Vector2
        nullable: true

- name: chooseWeaponAndTargetRequest
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: victim
      type:
        ref: PlayerId

- name: chooseWeaponAndTargetResponse
  payload:
    - name: targetPosition
      type:
        ref: Vector2
    - name: weaponPosition
      type:
        ref: Vector2

- name: useModuleSecondTimeRequest
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: moduleType
      type:
        ref: ModuleType

- name: useModuleSecondTimeResponse
  payload:
    - name: use
      type:
        type: boolean

- name: chooseTargetRequest
  payload:
    - name: player
      type:
        ref: PlayerId
    - name: victim
      type:
        ref: PlayerId

- name: chooseTargetResponse
  payload:
    - name: position
      type:
        ref: Vector2

- name: chooseModuleToRepairRequest
  payload:
    - name: player
      type:
        ref: PlayerId

- name: chooseModuleToRepairResponse
  payload:
    - name: position
      type:
        ref: Vector2
        nullable: true

- name: reducerUpdatedState
  payload:
    - name: delta
      type: { }

